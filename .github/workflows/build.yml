name: Build Photo Cleaner

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            suffix: .exe
            asset_name: PhotoCleaner-Windows-x64
          - os: ubuntu-latest
            suffix: .bin
            asset_name: PhotoCleaner-Linux-x64
          - os: macos-latest
            suffix: .dmg
            asset_name: PhotoCleaner-macOS-arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 构建可执行文件 (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller build.spec --noconfirm
          mkdir artifacts
          copy dist\PhotoCleaner\PhotoCleaner.exe artifacts\PhotoCleaner-Windows-x64.exe
        shell: cmd

      - name: 构建可执行文件 (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller build.spec --noconfirm
          mkdir -p artifacts
          cp dist/PhotoCleaner/PhotoCleaner artifacts/PhotoCleaner-macOS-arm64

      - name: 构建可执行文件 (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller build.spec --noconfirm
          mkdir -p artifacts
          cp dist/PhotoCleaner/PhotoCleaner artifacts/PhotoCleaner-Linux-x64

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: artifacts/*
